<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Vital Chat Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 5% 4rem;
            background: var(--bg-main);
        }
        .auth-card {
            background: var(--bg-surface);
            padding: 3rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .auth-card h2 { margin-bottom: 0.5rem; color: var(--primary-dark); }
        .auth-card p { color: var(--text-secondary); margin-bottom: 2rem; }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.2); }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }
        .auth-btn { width: 100%; margin-top: 1rem; }
        .auth-footer { margin-top: 1.5rem; font-size: 0.95rem; color: var(--text-secondary); }
        .auth-footer a { color: var(--primary); font-weight: 600; }
        #server-error { color: #ef4444; margin-bottom: 1rem; font-weight: 600; display: none; }
        #server-success { color: #22c55e; margin-bottom: 1rem; font-weight: 600; display: none; }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">
            <i class='bx bx-pulse'></i> Vital Chat
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="clinics.html">Find Clinics</a>
            <a href="appointment.html">Book Care</a>
        </nav>
        <div class="nav-actions">
            <div id="google_translate_element" class="lang-select"></div>
            <a href="login.html" class="btn-outline">Sign In</a>
            <a href="register.html" class="btn-primary">Register</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Sign in to your patient dashboard</p>
            
            <form action="../backend-php/api/login.php" method="POST" id="loginForm">
                <div id="server-error">Invalid credentials.</div>
                <div id="server-success">Registration successful. Please login.</div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                    <div class="error-msg" id="emailError">Please enter a valid email</div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <div class="error-msg" id="passwordError">Password is required</div>
                </div>
                
                <button type="submit" class="btn-primary auth-btn">Sign In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Check for URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error')) {
            const errDiv = document.getElementById('server-error');
            errDiv.style.display = 'block';
            if (urlParams.get('error') === 'system_error') {
                errDiv.textContent = 'A system error occurred. Please try again later.';
            }
        }
        if (urlParams.get('registered')) {
            document.getElementById('server-success').style.display = 'block';
        }
    </script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,ta,te,ur',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
